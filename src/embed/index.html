<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>remdev</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
<style>
/* ── Tokens ── */
:root {
  --bg:          #1a1a1c;
  --surface:     #242427;
  --border:      #343437;
  --accent:      #a78bfa;
  --accent-dim:  rgba(167,139,250,0.10);
  --text:        #e4e4e7;
  --text-muted:  #71717a;
  --overlay:     rgba(0,0,0,0.45);
  --ws-dot:      #52525b;
  --shadow:      0 2px 8px rgba(0,0,0,0.25);
  --focus-ring:  0 0 0 1px var(--border), 0 4px 16px rgba(0,0,0,0.10);
  --radius:      10px;
}
[data-theme="light"] {
  --bg:          #eeeef1;
  --surface:     #fafafc;
  --border:      #e0e0e6;
  --accent:      #7c6ff7;
  --accent-dim:  rgba(124,111,247,0.07);
  --text:        #27272a;
  --text-muted:  #a1a1aa;
  --overlay:     rgba(0,0,0,0.10);
  --ws-dot:      #d4d4d8;
  --shadow:      0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --focus-ring:  0 0 0 1px var(--border), 0 4px 16px rgba(0,0,0,0.06);
}

/* ── Base ── */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: monospace; background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; font-size: 13px; -webkit-font-smoothing: antialiased;
}

/* ── Status bar ── */
#status-bar {
  display: flex; align-items: center; height: 32px; flex-shrink: 0;
  padding: 0 14px; gap: 14px; font-size: 11px; color: var(--text-muted);
}
#hostname { flex: 1; letter-spacing: .2px; }

#workspaces { display: flex; gap: 6px; }
.workspace-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--ws-dot);
  cursor: pointer; transition: background .2s, transform .2s;
}
.workspace-dot.active { background: var(--accent); transform: scale(1.25); }
.workspace-dot:hover:not(.active) { background: var(--text-muted); }

/* ── Tiling container ── */
#main { flex: 1; position: relative; overflow: hidden; }
.workspace { position: absolute; inset: 0; display: none; }
.workspace.active { display: block; }

/* ── Window ── */
.window {
  position: absolute; overflow: hidden; background: var(--surface);
  border-radius: var(--radius); box-shadow: var(--shadow);
  transition: box-shadow .2s;
}
.window.focused { box-shadow: var(--focus-ring); }

.window-title {
  height: 30px; padding: 0 12px; display: flex; align-items: center; gap: 8px;
  cursor: pointer; border-bottom: 1px solid var(--border);
  font-family: system-ui, sans-serif; font-size: 12px; font-weight: 450;
  color: var(--text-muted); background: var(--surface);
  transition: background .15s; user-select: none;
}
.window.focused .window-title { background: var(--accent-dim); color: var(--text); }

.window-title::before {
  content: '';
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--border); transition: background .2s, box-shadow .2s;
}
.window.focused .window-title::before { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.window-title .title-text { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.window-title .modified { color: #f59e0b; margin-left: 2px; font-size: 11px; font-family: monospace; }

.window-body { position: absolute; inset: 31px 0 0 0; }

.CodeMirror, .CodeMirror pre { font-family: monospace !important; font-size: 15px; line-height: 1.2; }
.CodeMirror { height: 100%; border-radius: 0 0 var(--radius) var(--radius); }
.CodeMirror-gutters { border-right: 1px solid var(--border) !important; background: var(--surface) !important; }
.CodeMirror-linenumber { color: var(--text-muted) !important; }
.CodeMirror-activeline-background { background: var(--accent-dim) !important; }
.CodeMirror-cursor { border-left-color: var(--accent) !important; }

/* ── File picker ── */
dialog {
  background: var(--surface); border: 1px solid var(--border);
  width: 480px; padding: 0; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  color: var(--text);
}
dialog::backdrop { background: var(--overlay); backdrop-filter: blur(6px); }

dialog input {
  width: 100%; padding: 8px 14px; border: none; outline: none;
  border-bottom: 1px solid var(--border);
  font-family: monospace; font-size: 13px;
  background: var(--surface); color: var(--text);
}
dialog input:focus { border-bottom-color: var(--accent); }

.dialog-files { overflow-y: auto; max-height: 240px; }

.filelist-item {
  padding: 4px 16px; cursor: pointer; font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.filelist-item:hover { background: var(--accent-dim); }
.filelist-item.active { background: var(--accent); color: #fff; }
.filelist-item.dir { color: var(--text-muted); }
.filelist-item.active.dir { color: #fff; }

/* ── Scrollbar ── */
.xterm-viewport::-webkit-scrollbar { display: none; }
.xterm-viewport { scrollbar-width: none; }

/* ── Toast ── */
.toast {
  position: fixed; top: 38px; right: 12px; z-index: 2000;
  padding: 8px 16px; font-family: system-ui, sans-serif;
  font-size: 12px; font-weight: 500; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  box-shadow: var(--shadow); animation: fadeInOut 2s ease;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateY(-4px); }
  10% { opacity: 1; transform: translateY(0); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-4px); }
}
</style>
</head>
<body data-theme="light">
<div id="status-bar">
  <div id="workspaces"></div>
  <div id="hostname"></div>
</div>
<div id="main"></div>
<dialog id="picker">
  <input type="text" id="filename" value="/">
  <div class="dialog-files" id="filelist"></div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/yaml/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/selection/active-line.min.js"></script>

<script>
// State
var STATE = {
  activeWorkspace: 0,
  theme: 'light',
  fontFamily: 'monospace',
  fontSize: 15,
  workspaces: [],
  dialogDir: '/',
};
var $ = function(s) { return document.querySelector(s); };
var DAV = '/dav';
var CFG_KEY = 'rdev_config';
var CONFIG_PATH = '__rdev_config__';
var WS_URL = (location.protocol === 'https:' ? 'https://' : 'http://') + location.host + '/ws/terminal';
var utf8Decoder = new TextDecoder('utf-8');

var LANG_MAP = {
  js: 'javascript', ts: 'javascript', jsx: 'javascript', tsx: 'javascript',
  json: 'application/json', py: 'python', go: 'go',
  html: 'htmlmixed', css: 'css', md: 'markdown', xml: 'xml',
  sql: 'sql', java: 'text/x-java',
  c: 'text/x-csrc', cpp: 'text/x-c++src', h: 'text/x-csrc', hpp: 'text/x-c++src',
  sh: 'shell', bash: 'shell', yaml: 'yaml', yml: 'yaml',
  toml: null, ini: null, makefile: null, dockerfile: null, txt: null,
};

function ws() { return STATE.workspaces[STATE.activeWorkspace]; }

function notify(msg) {
  var el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 2600);
}

// WebDAV
function davGet(path, cb, errCb) {
  fetch(DAV + path).then(function(r) { if (!r.ok) throw Error(r.statusText); return r.text(); }).then(cb).catch(errCb || function(){});
}
function davPut(path, body, cb, errCb) {
  fetch(DAV + path, {method:'PUT',body:body}).then(function(r) { if (!r.ok) throw Error(r.statusText); if (cb) cb(); }).catch(errCb || function(){});
}
function davPropfind(path, cb, errCb) {
  fetch(DAV + path, {method:'PROPFIND',headers:{'Depth':'1','Content-Type':'application/xml'}})
    .then(function(r) { if (!r.ok) throw Error(r.statusText); return r.text(); })
    .then(function(xml) { cb(parsePropfind(xml)); }).catch(errCb || function(){});
}
function parsePropfind(xml) {
  var doc = new DOMParser().parseFromString(xml, 'text/xml'), items = [];
  doc.querySelectorAll('response').forEach(function(r) {
    var href = r.querySelector('href')?.textContent || '';
    if (href.indexOf('/dav') === 0) href = href.slice(4) || '/';
    var isDir = r.querySelector('resourcetype')?.querySelector('collection');
    var name = decodeURIComponent(href.replace(/\/$/, '').split('/').pop() || '');
    if (!name) return;
    items.push({ name: name, path: href, isDir: !!isDir });
  });
  return items;
}

// Config (stored in browser localStorage)
function loadConfig() {
  try {
    var saved = JSON.parse(localStorage.getItem(CFG_KEY) || '{}');
    STATE.theme = saved.theme || 'light';
    STATE.fontFamily = saved.font_family || 'monospace';
    STATE.fontSize = saved.font_size || 15;
  } catch(e) {}
  applyTheme();
}
function saveConfig() {
  localStorage.setItem(CFG_KEY, JSON.stringify({
    theme: STATE.theme,
    font_family: STATE.fontFamily,
    font_size: STATE.fontSize,
  }));
}
function applyTheme() {
  document.body.dataset.theme = STATE.theme;
  STATE.workspaces.forEach(function(wksp) {
    wksp.windows.forEach(function(win) {
      if (win.type === 'editor' && win.cm) {
        win.cm.setOption('theme', STATE.theme === 'dark' ? 'material-darker' : 'default');
      }
      if (win.type === 'terminal' && win.term) {
        win.term.options.theme = terminalTheme();
      }
    });
  });
}

function openConfigEditor() {
  var cur = ws();
  var existing = cur.windows.find(function(w) { return w.filePath === CONFIG_PATH; });
  if (existing) { focusWindow(existing.id); return; }
  addWindowToTiling(createWindow('editor', { filePath: CONFIG_PATH, title: 'rdev.json' }));
}

// Status bar
function renderStatusBar() {
  var el = $('#workspaces');
  // only rebuild if count changed
  if (el.children.length !== STATE.workspaces.length) {
    el.innerHTML = '';
    for (var i = 0; i < STATE.workspaces.length; i++) {
      var d = document.createElement('span');
      d.className = 'workspace-dot';
      d.title = 'Workspace ' + (i + 1);
      d.onclick = (function(idx) { return function() { switchWorkspace(idx); }; })(i);
      el.appendChild(d);
    }
  }
  // update active state
  for (var i = 0; i < el.children.length; i++) {
    el.children[i].classList.toggle('active', i === STATE.activeWorkspace);
  }
}

// Workspaces
var MAX_WORKSPACES = 10;
function ensureWorkspace(idx) {
  if (idx < 0 || idx >= MAX_WORKSPACES) return;
  while (STATE.workspaces.length <= idx) {
    var i = STATE.workspaces.length;
    STATE.workspaces.push({windows:[],activeId:null});
    var el = document.createElement('div');
    el.className = 'workspace';
    el.id = 'ws-' + i;
    $('#main').appendChild(el);
  }
}
function initWorkspaces() {
  ensureWorkspace(0);
  document.getElementById('ws-0').classList.add('active');
}
function switchWorkspace(idx) {
  if (idx < 0 || idx >= MAX_WORKSPACES) return;
  if (STATE.activeWorkspace === idx) return;
  ensureWorkspace(idx);
  ws().windows.forEach(function(w) { if (w.container) w.container.style.display = 'none'; });
  document.getElementById('ws-' + STATE.activeWorkspace).classList.remove('active');
  STATE.activeWorkspace = idx;
  document.getElementById('ws-' + idx).classList.add('active');
  var cur = ws();
  cur.windows.forEach(function(w) { if (w.container) w.container.style.display = ''; });
  cur.windows.forEach(function(w) {
    if (w.type === 'terminal' && w.fitAddon) w.fitAddon.fit();
    if (w.type === 'editor' && w.cm) w.cm.refresh();
  });
  renderStatusBar();
  applyLayout();
  if (cur.activeId) focusWindow(cur.activeId);
}

// Tiling: binary tree
var winCounter = 0;

function createWindow(type, opts) {
  opts = opts || {};
  winCounter++;
  var id = 'w' + winCounter;
  var win = {
    id: id, type: type,
    filePath: opts.filePath || null, dirty: false,
    cm: null, term: null, socket: null, fitAddon: null, uuid: null,
    container: document.createElement('div'),
    title: opts.title || (type === 'terminal' ? 'shell' : (opts.filePath || 'untitled')),
  };
  win.container.className = 'window focused'; win.container.id = id;
  win.container.innerHTML =
    '<div class="window-title"><span class="title-text">' + win.title + '</span><span class="modified" style="display:none"> [modified]</span></div>' +
    '<div class="window-body"></div>';
  win.container.querySelector('.window-title').onclick = function() { focusWindow(id); };
  return win;
}

function leafNode(win) { return { type: 'leaf', win: win }; }

function addWindowToTiling(win) {
  var cur = ws();
  var rootEl = document.getElementById('ws-' + STATE.activeWorkspace);
  rootEl.appendChild(win.container);
  cur.windows.push(win);
  if (!cur.tree) {
    cur.tree = leafNode(win);
  } else {
    var activeLeaf = findLeafNode(cur.tree, cur.activeId) || rightmostLeaf(cur.tree);
    splitLeaf(activeLeaf, win);
  }
  cur.activeId = win.id;
  unfocusAll();
  win.container.classList.add('focused');
  applyLayout();
  setTimeout(function() { initWindowContent(win); }, 30);
}

function splitLeaf(leaf, newWin) {
  var node = leaf.node || leaf;
  var container = node.win.container;
  var dir = container.clientWidth >= container.clientHeight ? 'v' : 'h';
  var split = { type: 'split', dir: dir, ratio: 50, a: leafNode(node.win), b: leafNode(newWin) };
  replaceNodeInTree(ws().tree, node, split);
}

function replaceNodeInTree(tree, target, replacement) {
  if (tree === target) { ws().tree = replacement; return true; }
  if (tree.type === 'leaf') return false;
  if (tree.a === target) { tree.a = replacement; return true; }
  if (tree.b === target) { tree.b = replacement; return true; }
  return replaceNodeInTree(tree.a, target, replacement) || replaceNodeInTree(tree.b, target, replacement);
}

function findLeafNode(tree, winId) {
  if (!tree) return null;
  if (tree.type === 'leaf') return tree.win && tree.win.id === winId ? tree : null;
  return findLeafNode(tree.a, winId) || findLeafNode(tree.b, winId);
}

function findParentOf(tree, target) {
  if (!tree || tree.type === 'leaf') return null;
  if (tree.a === target || tree.b === target) return tree;
  return findParentOf(tree.a, target) || findParentOf(tree.b, target);
}

function rightmostLeaf(tree) {
  if (!tree) return null;
  if (tree.type === 'leaf') return tree;
  return rightmostLeaf(tree.b) || rightmostLeaf(tree.a);
}

function hasDescendant(node, target) {
  if (!node || node.type === 'leaf') return node === target;
  return hasDescendant(node.a, target) || hasDescendant(node.b, target);
}

// Layout
function applyLayout() {
  var cur = ws();
  if (!cur.tree) return;
  var rootEl = document.getElementById('ws-' + STATE.activeWorkspace);
  var w = rootEl.clientWidth, h = rootEl.clientHeight;
  if (!w || !h) { requestAnimationFrame(applyLayout); return; }
  layoutTree(cur.tree, { x: 0, y: 0, w: w, h: h });
  setTimeout(function() {
    cur.windows.forEach(function(win) {
      if (win.type === 'terminal' && win.fitAddon) {
        try { win.fitAddon.fit(); } catch(e) {}
        if (win.term && win.socket && win.socket.readyState === WebSocket.OPEN) {
          win.socket.send(JSON.stringify({ type: 'resize', cols: win.term.cols, rows: win.term.rows }));
        }
      }
    });
  }, 0);
}

function layoutTree(node, rect) {
  if (!node) return;
  if (node.type === 'leaf') {
    var win = node.win;
    if (win && win.container) {
      var G = 2;
      win.container.style.left   = (rect.x + G) + 'px';
      win.container.style.top    = (rect.y + G) + 'px';
      win.container.style.width  = (rect.w - G * 2) + 'px';
      win.container.style.height = (rect.h - G * 2) + 'px';
    }
    return;
  }
  var r = node.ratio / 100;
  if (node.dir === 'v') {
    var aW = Math.round(rect.w * r);
    layoutTree(node.a, { x: rect.x, y: rect.y, w: aW, h: rect.h });
    layoutTree(node.b, { x: rect.x + aW, y: rect.y, w: rect.w - aW, h: rect.h });
  } else {
    var aH = Math.round(rect.h * r);
    layoutTree(node.a, { x: rect.x, y: rect.y, w: rect.w, h: aH });
    layoutTree(node.b, { x: rect.x, y: rect.y + aH, w: rect.w, h: rect.h - aH });
  }
}

function unfocusAll() { ws().windows.forEach(function(w) { w.container.classList.remove('focused'); }); }

function focusWindow(id) {
  unfocusAll();
  var win = ws().windows.find(function(w) { return w.id === id; });
  if (!win) return;
  win.container.classList.add('focused');
  ws().activeId = id;
  if (win.type === 'editor' && win.cm) win.cm.focus();
  if (win.type === 'terminal' && win.term) win.term.focus();
}

function closeWindow(force) {
  var win = ws().windows.find(function(w) { return w.id === ws().activeId; });
  if (!win) return;
  if (win.type === 'editor' && win.modified && !force && !confirm('Unsaved changes. Close?')) return;
  removeWindow(win);
}

function removeWindow(win) {
  var cur = ws();
  if (win.type === 'terminal' && win.socket) win.socket.close();
  win.container.remove();
  var leaf = findLeafNode(cur.tree, win.id);
  if (leaf) {
    var parent = findParentOf(cur.tree, leaf);
    if (parent) {
      replaceNodeInTree(cur.tree, parent, parent.a === leaf ? parent.b : parent.a);
    } else {
      cur.tree = null;
    }
  }
  cur.windows = cur.windows.filter(function(w) { return w.id !== win.id; });
  if (cur.windows.length === 0) { cur.activeId = null; applyLayout(); return; }
  cur.activeId = cur.windows[cur.windows.length - 1].id;
  var active = cur.windows.find(function(w) { return w.id === cur.activeId; });
  if (active) active.container.classList.add('focused');
  applyLayout();
}

function resizeWindow(win, delta) {
  if (!win) return;
  var leaf = findLeafNode(ws().tree, win.id);
  if (!leaf) return;
  var parent = findParentOf(ws().tree, leaf);
  if (!parent || parent.type !== 'split') return;
  var isA = parent.a === leaf || hasDescendant(parent.a, leaf);
  parent.ratio = Math.max(5, Math.min(95, Math.round(parent.ratio + (isA ? delta : -delta))));
  applyLayout();
}

function navFocus(dir) {
  var windows = ws().windows;
  if (windows.length <= 1) return;
  var idx = windows.findIndex(function(w) { return w.id === ws().activeId; });
  if (idx < 0) return;
  focusWindow(windows[(idx + dir + windows.length) % windows.length].id);
}

// Window content
function initWindowContent(win) {
  var body = win.container.querySelector('.window-body');
  if (win.type === 'editor') {
    initEditor(win, body);
    if (win.filePath) loadFileIntoEditor(win);
    win.cm.focus();
  } else {
    initTerminal(win, body);
    connectTerminal(win);
    win.term.focus();
  }
}

function getEditorMode(filePath) {
  if (filePath === CONFIG_PATH) return 'application/json';
  var ext = (filePath || '').split('.').pop().toLowerCase();
  return LANG_MAP[ext] !== undefined ? LANG_MAP[ext] : null;
}

function initEditor(win, body) {
  win.cm = CodeMirror(body, {
    value: '',
    mode: getEditorMode(win.filePath),
    theme: STATE.theme === 'dark' ? 'material-darker' : 'default',
    lineNumbers: true, autoCloseBrackets: true, styleActiveLine: true,
    matchBrackets: true, indentUnit: 4, tabSize: 4, viewportMargin: Infinity,
  });
  win.cm.on('change', function() {
    if (!win.modified) { win.modified = true; setDirty(win, true); }
  });
}

function terminalTheme() {
  if (STATE.theme === 'dark') {
    return {
      background: '#1e1e22',
      foreground: '#d4d4d8',
      cursor: '#a78bfa',
      selectionBackground: '#3d3a4e',
      black: '#1e1e22', red: '#f87171', green: '#6ee7b7', yellow: '#fbbf24',
      blue: '#93c5fd', magenta: '#c4b5fd', cyan: '#67e8f9', white: '#d4d4d8',
      brightBlack: '#52525b', brightRed: '#fca5a5', brightGreen: '#a7f3d0',
      brightYellow: '#fde68a', brightBlue: '#bfdbfe', brightMagenta: '#ddd6fe',
      brightCyan: '#a5f3fc', brightWhite: '#fafafa',
    };
  }
  return {
    background: '#fafafc',
    foreground: '#3f3f46',
    cursor: '#7c6ff7',
    selectionBackground: '#e8e5fd',
    black: '#27272a', red: '#e04444', green: '#4d9a3a', yellow: '#b8851e',
    blue: '#4b80d8', magenta: '#7c6ff7', cyan: '#2d8a96', white: '#a1a1aa',
    brightBlack: '#71717a', brightRed: '#ef6666', brightGreen: '#5eb840',
    brightYellow: '#d09830', brightBlue: '#6b9af0', brightMagenta: '#9b8cf8',
    brightCyan: '#40a8b8', brightWhite: '#fafafc',
  };
}

function initTerminal(win, body) {
  var el = document.createElement('div');
  el.style.cssText = 'width:100%;height:100%;padding:2px';
  body.appendChild(el);
  var fs = STATE.fontSize || 14;
  win.term = new Terminal({
    fontSize: fs,
    fontFamily: STATE.fontFamily + ', monospace',
    theme: terminalTheme(),
    cursorBlink: true, allowProposedApi: true, lineHeight: 1.2,
    cols: Math.floor(body.clientWidth / (fs * 0.6)) || 80,
    rows: Math.floor(body.clientHeight / (fs * 1.3)) || 24,
  });
  win.fitAddon = new FitAddon.FitAddon();
  win.term.loadAddon(win.fitAddon);
  win.term.open(el);
  win.fitAddon.fit();

  // clipboard: Cmd/Ctrl+C copies selection, Cmd/Ctrl+V pastes
  win.term.attachCustomKeyEventHandler(function(e) {
    if (e.type !== 'keydown') return true;
    var mod = e.ctrlKey || e.metaKey;
    if (mod && e.key === 'c') {
      var sel = win.term.getSelection();
      if (sel) { navigator.clipboard.writeText(sel).catch(function(){}); return false; }
    }
    if (mod && e.key === 'v') {
      navigator.clipboard.readText().then(function(t) {
        if (win.socket && win.socket.readyState === WebSocket.OPEN) {
          win.socket.send(JSON.stringify({ type: 'input', data: b64Encode(t) }));
        }
      }).catch(function(){});
      return false;
    }
    return true;
  });
}

function setDirty(win, on) {
  var el = win.container.querySelector('.modified');
  if (el) el.style.display = on ? 'inline' : 'none';
}

function sniffMode(text) {
  var t = text.trim();
  if (t[0] === '{' || t[0] === '[') return 'application/json';
  return null;
}

function loadFileIntoEditor(win) {
  function setContent(text) {
    win.cm.setValue(text);
    var curMode = win.cm.getOption('mode');
    if (!curMode) {
      var sniffed = sniffMode(text);
      if (sniffed) win.cm.setOption('mode', sniffed);
    }
    win.modified = false; setDirty(win, false);
  }
  if (win.filePath === CONFIG_PATH) {
    setContent('{}');
  } else {
    davGet(win.filePath, setContent, function(e) { notify('Load failed: ' + e.message); });
  }
}

function saveEditor(win) {
  if (!win || win.type !== 'editor') return;
  var content = win.cm.getValue();
  function markSaved() { win.modified = false; setDirty(win, false); notify('Saved'); }
  if (win.filePath === CONFIG_PATH) {
    try {
      var payload = JSON.parse(content);
      if (payload.theme) STATE.theme = payload.theme;
      if (payload.font_family) STATE.fontFamily = payload.font_family;
      if (payload.font_size) STATE.fontSize = payload.font_size;
      saveConfig();
      applyTheme();
      markSaved();
    } catch(e) { notify('Invalid JSON'); }
  } else {
    davPut(win.filePath, content, markSaved, function() { notify('Save failed'); });
  }
}

function reloadEditor(win) {
  if (win && win.type === 'editor') loadFileIntoEditor(win);
}

// Terminal
function b64Encode(str) {
  var bytes = new TextEncoder().encode(str);
  var bin = '';
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64Decode(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return utf8Decoder.decode(bytes, { stream: true });
}

function connectTerminal(win) {
  fetch(WS_URL).then(function(r) {
    var socket = new WebSocket(r.url.replace(/^http/, 'ws'));
    win.socket = socket;
    socket.onopen = function() { updateTermSize(win); };
    socket.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      if (msg.type === 'output') { win.term.write(b64Decode(msg.data)); }
      else if (msg.type === 'title') {
        win.title = msg.text;
        var t = win.container.querySelector('.title-text');
        if (t) t.textContent = msg.text;
      } else if (msg.type === 'exit') { removeWindow(win); }
    };
    win.term.onData(function(data) {
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'input', data: b64Encode(data) }));
      }
    });
  });
}

function updateTermSize(win) {
  try { win.fitAddon.fit(); } catch(e) {}
  if (win.term && win.socket && win.socket.readyState === WebSocket.OPEN) {
    win.socket.send(JSON.stringify({ type: 'resize', cols: win.term.cols, rows: win.term.rows }));
  }
}

// File picker
var FILE_CACHE = [];
function openFilePicker() {
  STATE.dialogDir = '/';
  syncInput();
  loadFileList();
  $('#picker').showModal();
  $('#filename').focus();
}
function closeFilePicker() { $('#picker').close(); }

function syncInput() {
  var inp = $('#filename');
  inp.value = STATE.dialogDir;
  // place cursor at end
  inp.setSelectionRange(inp.value.length, inp.value.length);
}

function openPath(path) {
  closeFilePicker();
  var existing = ws().windows.find(function(w) { return w.filePath === path; });
  if (existing) { focusWindow(existing.id); return; }
  addWindowToTiling(createWindow('editor', { filePath: path, title: path }));
}

function loadFileList() {
  davPropfind(STATE.dialogDir, function(items) {
    var dirs = items.filter(function(i) { return i.isDir; }).sort(function(a, b) { return a.name.localeCompare(b.name); });
    var files = items.filter(function(i) { return !i.isDir; }).sort(function(a, b) { return a.name.localeCompare(b.name); });
    FILE_CACHE = [];
    var el = $('#filelist'); el.innerHTML = '';
    function add(name, isDir, path) {
      var d = document.createElement('div');
      d.className = 'filelist-item' + (isDir ? ' dir' : '');
      d.textContent = isDir ? name + '/' : name;
      d.onclick = function() {
        if (isDir) { STATE.dialogDir = path; syncInput(); loadFileList(); }
        else openPath(path);
      };
      el.appendChild(d);
      FILE_CACHE.push({ el: d, name: name, isDir: isDir, path: path });
    }
    if (STATE.dialogDir !== '/') {
      var parent = STATE.dialogDir.split('/').slice(0, -2).join('/') + '/' || '/';
      add('..', true, parent);
    }
    dirs.forEach(function(d) { add(d.name, true, d.path); });
    files.forEach(function(f) { add(f.name, false, f.path); });
    applyFilter();
    highlightFirst();
  }, function() { notify('List failed'); });
}

function getVisible() {
  var result = [];
  FILE_CACHE.forEach(function(item) {
    if (item.el.style.display !== 'none') result.push(item);
  });
  return result;
}

function highlightFirst() {
  FILE_CACHE.forEach(function(item) { item.el.classList.remove('active'); });
  var vis = getVisible();
  if (vis.length) {
    vis[0].el.classList.add('active');
    vis[0].el.scrollIntoView({ block: 'nearest' });
  }
}

function moveHighlight(dir) {
  var vis = getVisible();
  if (vis.length < 2) return;
  var idx = -1;
  for (var i = 0; i < vis.length; i++) {
    if (vis[i].el.classList.contains('active')) { idx = i; break; }
  }
  if (idx < 0) { highlightFirst(); return; }
  FILE_CACHE.forEach(function(item) { item.el.classList.remove('active'); });
  var next = vis[(idx + dir + vis.length) % vis.length];
  next.el.classList.add('active');
  next.el.scrollIntoView({ block: 'nearest' });
}

function applyFilter() {
  var input = $('#filename').value;
  // the part after the directory path is the filter
  var filter = '';
  if (input.indexOf(STATE.dialogDir) === 0) {
    filter = input.slice(STATE.dialogDir.length).toLowerCase();
  }
  FILE_CACHE.forEach(function(item) {
    item.el.style.display = filter && item.name.toLowerCase().indexOf(filter) === -1 ? 'none' : '';
  });
  highlightFirst();
}

// backdrop click closes
$('#picker').addEventListener('click', function(e) { if (e.target === this) this.close(); });

$('#filename').oninput = function() {
  var v = this.value;
  // if input ends with '/', try to navigate into matching dir
  if (v.endsWith('/') && v !== STATE.dialogDir) {
    // extract the name before the trailing /
    var base = v.slice(0, -1);
    var name = base.split('/').pop().toLowerCase();
    if (name) {
      // look for a matching directory in current cache
      var match = null;
      FILE_CACHE.forEach(function(item) {
        if (!match && item.isDir && item.name !== '..' && item.name.toLowerCase().indexOf(name) === 0) {
          match = item;
        }
      });
      if (match) {
        STATE.dialogDir = match.path;
        syncInput();
        loadFileList();
        return;
      }
    }
  }
  applyFilter();
};
$('#filename').onkeydown = function(e) {
  if (e.key === 'Escape') { closeFilePicker(); return; }
  if (e.key === 'Tab') { e.preventDefault(); autocomplete(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); moveHighlight(1); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); moveHighlight(-1); return; }
  if (e.key === 'Backspace') {
    if (this.value === STATE.dialogDir && STATE.dialogDir !== '/') {
      e.preventDefault();
      STATE.dialogDir = STATE.dialogDir.split('/').slice(0, -2).join('/') + '/' || '/';
      syncInput();
      loadFileList();
    }
    return;
  }
  if (e.key !== 'Enter') return;
  // find the currently highlighted item
  var active = $('#filelist').querySelector('.filelist-item.active');
  if (active) {
    var item = null;
    for (var i = 0; i < FILE_CACHE.length; i++) {
      if (FILE_CACHE[i].el === active) { item = FILE_CACHE[i]; break; }
    }
    if (item) {
      if (item.isDir) { STATE.dialogDir = item.path; syncInput(); loadFileList(); }
      else openPath(item.path);
      return;
    }
  }
  var p = this.value.trim();
  if (p && p !== '/') openPath(p[0] === '/' ? p : STATE.dialogDir.replace(/\/$/, '') + '/' + p);
};

function autocomplete() {
  var input = $('#filename');
  var vis = getVisible();
  if (!vis.length) return;
  var name = vis[0].name;
  if (name === '..') return;
  input.value = STATE.dialogDir + name;
  applyFilter();
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if (!e.altKey) return;
  var cur = ws();
  var active = cur.windows.find(function(w) { return w.id === cur.activeId; });
  function prevent() { e.preventDefault(); e.stopImmediatePropagation(); }
  switch (e.key.toLowerCase()) {
    case 'b': prevent(); openFilePicker(); break;
    case ',': prevent(); openConfigEditor(); break;
    case 'n': prevent(); addWindowToTiling(createWindow('terminal')); break;
    case 'w': prevent(); closeWindow(); break;
    case 's': prevent(); if (active && active.type === 'editor') saveEditor(active); break;
    case 'r': prevent(); if (active && active.type === 'editor') reloadEditor(active); break;
    case '=': prevent(); resizeWindow(active, 10); break;
    case '-': prevent(); resizeWindow(active, -10); break;
    case '1': case '2': case '3': case '4':
    case '5': case '6': case '7': case '8': case '9': case '0':
      prevent(); switchWorkspace(e.key === '0' ? 9 : parseInt(e.key) - 1); break;
    case 'arrowup': prevent(); navFocus(-1); break;
    case 'arrowdown': prevent(); navFocus(1); break;
    case 'arrowleft': prevent(); navFocus(-1); break;
    case 'arrowright': prevent(); navFocus(1); break;
  }
}, { capture: true });

// Click focus
document.addEventListener('click', function(e) {
  var titleEl = e.target.closest('.window-title');
  if (titleEl) { focusWindow(titleEl.parentElement.id); return; }
  var bodyEl = e.target.closest('.window-body');
  if (bodyEl) focusWindow(bodyEl.parentElement.id);
});

// Init
function init() {
  initWorkspaces();
  renderStatusBar();
  loadConfig();
  fetch('/api/info').then(function(r) { return r.json(); }).then(function(info) {
    var addrs = info.addrs && info.addrs.length > 0 ? info.addrs.join(', ') : 'no addr';
    $('#hostname').textContent = info.hostname + ' (' + addrs + ')';
  }).catch(function() {
    $('#hostname').textContent = location.host;
  });
  window.addEventListener('resize', function() { applyLayout(); });
}
init();
</script>
